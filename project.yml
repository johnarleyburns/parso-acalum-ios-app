name: Acalum
options:
  bundleIdPrefix: com.parso.acalum
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Acalum:
    type: application
    platform: iOS
    preBuildScripts:
      - name: "Copy parso_indexer.db from source project"
        basedOnDependencyAnalysis: false
        script: |
          SOURCE="$SRCROOT/../parso-ia-music-indexer/data/parso_indexer.db"
          DEST="$SRCROOT/Acalum/Resources/parso_indexer.db"

          if [ ! -f "$SOURCE" ]; then
              echo "warning: Source database not found at $SOURCE — skipping copy"
              exit 0
          fi

          if [ -f "$DEST" ] && [ "$SOURCE" -ot "$DEST" ]; then
              echo "parso_indexer.db is up to date"
              exit 0
          fi

          echo "Copying parso_indexer.db from source project..."
          rm -f "$DEST" "${DEST}-wal" "${DEST}-shm"
          sqlite3 "$SOURCE" "VACUUM INTO '$DEST';"
          touch "${DEST}-wal" "${DEST}-shm"
          echo "parso_indexer.db: $(stat -f%z "$DEST") bytes, $(sqlite3 "$DEST" "SELECT COUNT(*) FROM tracks WHERE status='completed';") tracks"
    sources:
      - path: Acalum
        excludes:
          - "**/.DS_Store"
          - "Resources/tokenizer_full/**"
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: Acalum
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: NO
        INFOPLIST_KEY_NSAppTransportSecurity_NSExceptionDomains_archive.org_NSIncludesSubdomains: YES
        INFOPLIST_KEY_NSAppTransportSecurity_NSExceptionDomains_archive.org_NSExceptionRequiresForwardSecrecy: NO
        INFOPLIST_KEY_NSAppTransportSecurity_NSExceptionDomains_archive.org_NSExceptionAllowsInsecureHTTPLoads: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIBackgroundModes: audio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "iPhone Developer"
        DEVELOPMENT_TEAM: 3264Y8YUGV
    scheme:
      testTargets:
        - AcalumTests

  AcalumTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AcalumTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Acalum
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Acalum.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Acalum"
        BUNDLE_LOADER: "$(TEST_HOST)"
