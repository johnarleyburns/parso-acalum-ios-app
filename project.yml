name: Acalum
options:
  bundleIdPrefix: com.parso.acalum
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Acalum:
    type: application
    platform: iOS
    preBuildScripts:
      - name: "Copy parso_indexer.db from source project"
        basedOnDependencyAnalysis: false
        script: |
          SOURCE="$SRCROOT/../parso-ia-music-indexer/data/parso_indexer.db"
          DEST="$SRCROOT/Acalum/Resources/parso_indexer.db"

          if [ ! -f "$SOURCE" ]; then
              echo "warning: Source database not found at $SOURCE — skipping copy"
              exit 0
          fi

          if [ -f "$DEST" ] && [ "$SOURCE" -ot "$DEST" ]; then
              echo "parso_indexer.db is up to date"
              exit 0
          fi

          echo "Copying parso_indexer.db from source project..."
          rm -f "$DEST" "${DEST}-wal" "${DEST}-shm"
          sqlite3 "$SOURCE" "VACUUM INTO '$DEST';"
          touch "${DEST}-wal" "${DEST}-shm"
          echo "parso_indexer.db: $(stat -f%z "$DEST") bytes, $(sqlite3 "$DEST" "SELECT COUNT(*) FROM tracks WHERE status='completed';") tracks"
    sources:
      - path: Acalum
        excludes:
          - "**/.DS_Store"
          - "Resources/tokenizer_full/**"
    info:
      path: Acalum/Info.plist
      properties:
        CFBundleDisplayName: Acalum
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            archive.org:
              NSIncludesSubdomains: true
              NSExceptionRequiresForwardSecrecy: false
              NSExceptionAllowsInsecureHTTPLoads: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "iPhone Developer"
        DEVELOPMENT_TEAM: 3264Y8YUGV
    scheme:
      testTargets:
        - AcalumTests

  AcalumTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AcalumTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Acalum
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Acalum.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Acalum"
        BUNDLE_LOADER: "$(TEST_HOST)"
